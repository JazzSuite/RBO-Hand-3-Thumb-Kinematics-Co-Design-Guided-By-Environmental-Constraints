<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RBO Hand 3 Thumb Kinematics Co-Design Guided By Environmental Constraints</title>
  <style>
    body {
      font-family: Georgia, serif;
      max-width: 1400px;
      margin: 40px auto;
      padding: 0 32px;
      color: #222;
      background: #fff;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: normal;
      border-bottom: 1px solid #ccc;
      padding-bottom: 12px;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 40px;
    }
    h2 {
      font-size: 1.1rem;
      font-weight: bold;
      border-bottom: 1px solid #eee;
      padding-bottom: 6px;
      margin-bottom: 16px;
    }
    .section {
      margin-bottom: 48px;
    }
    .col-headers {
      display: grid;
      grid-template-columns: 1fr 2fr 2fr;
      gap: 20px;
      margin-bottom: 4px;
      padding-bottom: 6px;
      border-bottom: 1px solid #ddd;
    }
    .col-header {
      font-size: 0.9rem;
      font-weight: bold;
      text-align: center;
      color: #444;
    }
    .row-block {
      margin-bottom: 32px;
    }
    .row-subtitle {
      font-size: 0.95rem;
      font-weight: bold;
      color: #333;
      margin: 12px 0 8px 0;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 2fr 2fr;
      gap: 20px;
      align-items: center;
    }
    .row img {
      width: 100%;
      border: none;
      border-radius: 4px;
      display: block;
    }
    .video-wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid #ddd;
    }
    .video-wrapper iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <h1>RBO Hand 3 Thumb Kinematics Co-Design Guided By Environmental Constraints</h1>

  <div class="section">
    <h2>Cube Rotation</h2>

    <div class="col-headers">
      <div class="col-header">Hand Design</div>
      <div class="col-header">Normal Speed</div>
      <div class="col-header">0.3x Speed</div>
    </div>

    <!-- Row 1 -->
    <div class="row-block">
      <p class="row-subtitle">Default Design</p>
      <div class="row">
        <div>
          <img src="default_hand_cut.jpg" alt="Default hand design">
        </div>
        <div class="video-wrapper">
          <iframe src="https://www.youtube.com/embed/lAiNUZCVWTQ?controls=0" allowfullscreen></iframe>
        </div>
        <div class="video-wrapper">
          <iframe src="https://www.youtube.com/embed/qj2TQZug2ys?controls=0" allowfullscreen></iframe>
        </div>
      </div>
    </div>

    <!-- Row 2 -->
    <div class="row-block">
      <p class="row-subtitle">Dexterous Design</p>
      <div class="row">
        <div>
          <img src="pointy_config_cut.jpg" alt="Dexterous hand design">
        </div>
        <div class="video-wrapper">
          <iframe src="https://www.youtube.com/embed/KiaMv4uqHGw?controls=0" allowfullscreen></iframe>
        </div>
        <div class="video-wrapper">
          <iframe src="https://www.youtube.com/embed/0zV1ZXo6axA?controls=0" allowfullscreen></iframe>
        </div>
      </div>
    </div>

    <!-- Row 3 -->
    <div class="row-block">
      <p class="row-subtitle">Complete Design</p>
      <div class="row">
        <div>
          <img src="all_config_cut.jpg" alt="Complete hand design">
        </div>
        <div class="video-wrapper">
          <iframe src="https://www.youtube.com/embed/XzFfOzHKQ0s?controls=0" allowfullscreen></iframe>
        </div>
        <div class="video-wrapper">
          <iframe src="https://www.youtube.com/embed/n0DyBEX3UH4?controls=0" allowfullscreen></iframe>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
